packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  vue: ^3.5.13
  vue-router: ^4.5.0
  "@vitejs/plugin-vue": ^5.2.1
  lucide-vue-next: ^0.475.0
  vite-plugin-dts: ^4.5.0
  hono: ^4.6.14
  "better-auth": ^1.1.1
  "@better-auth/drizzle-adapter": ^1.1.1
  "drizzle-orm": ^0.39.0
  "@libsql/client": ^0.14.0
  "drizzle-kit": ^0.30.0
  tsx: ^4.19.2
  concurrently: ^9.1.2
  "@hono/node-server": ^1.13.7
  "@hono/vite-dev-server": ^0.26.0
  "vite-plugin-killer-instincts": ^1.1.0
  tailwindcss: ^4.0.0
  "@tailwindcss/vite": ^4.0.0
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  esbuild: true
